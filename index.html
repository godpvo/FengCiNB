<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>文本服务器</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{height:100vh;display:flex;flex-direction:column;background:#1a1a2e;color:#eee;font-family:monospace}
#bar{padding:8px 12px;background:#16213e;font-size:13px;display:flex;gap:10px;align-items:center}
#bar span{flex:1}
#editor{flex:1;width:100%;padding:12px;border:none;outline:none;background:#0f0f23;color:#dcdcdc;font-size:16px;line-height:1.6;font-family:monospace;resize:none}
#saveBtn{padding:4px 12px;background:#e94560;color:#fff;border:none;border-radius:4px;cursor:pointer}
</style>
</head>
<body>
<div id="bar">
  <span id="status">加载中...</span>
  <button id="saveBtn">保存</button>
</div>
<textarea id="editor" placeholder="输入内容..."></textarea>

<script>
const CONFIG={owner:'godpvo',repo:'FengCiNB',path:'content.txt',branch:'main'};
const TOKEN='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'; // ⚠️ 建议删除重新生成
let sha=null,timer=null;
const editor=document.getElementById('editor');
const status=document.getElementById('status');

async function load(){
  try{
    const r=await fetch(`https://api.github.com/repos/${CONFIG.owner}/${CONFIG.repo}/contents/${CONFIG.path}?ref=${CONFIG.branch}`,{headers:{'Authorization':`token ${TOKEN}`}});
    if(r.ok){const d=await r.json();sha=d.sha;editor.value=atob(d.content.replace(/\n/g,''));status.textContent='已加载';}
    else if(r.status===404){status.textContent='新文件';}
    else{status.textContent='加载失败';}
  }catch(e){status.textContent='离线';}
}
async function save(){
  if(!editor.value&&status.textContent==='新文件')return;
  status.textContent='保存中...';
  const body={message:`save ${new Date().toLocaleString()}`,content:btoa(unescape(encodeURIComponent(editor.value))),branch:CONFIG.branch};
  if(sha)body.sha=sha;
  try{
    const r=await fetch(`https://api.github.com/repos/${CONFIG.owner}/${CONFIG.repo}/contents/${CONFIG.path}`,{method:'PUT',headers:{'Authorization':`token ${TOKEN}`,'Content-Type':'application/json'},body:JSON.stringify(body)});
    if(r.ok){const d=await r.json();sha=d.content.sha;status.textContent='已保存';}
    else{status.textContent='保存失败';}
  }catch(e){status.textContent='保存失败';}
}
editor.addEventListener('input',()=>{
  status.textContent='编辑中...';
  clearTimeout(timer);
  timer=setTimeout(save,3000);
});
editor.addEventListener('keydown',e=>{if(e.ctrlKey&&e.key==='s'){e.preventDefault();save();}});
document.getElementById('saveBtn').addEventListener('click',save);
load();
</script>
</body>
</html>
